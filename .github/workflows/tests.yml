name: Tests

on:
  push:
    paths:
      - ".github/workflows/tests.yml"
      - "deepface/**"
      - "tests/**"
      - "api/**"
      - "requirements.txt"
      - ".gitignore"
      - "setup.py"
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - "deepface/**"
      - "tests/**"
      - "api/**"
      - "requirements.txt"
      - ".gitignore"
      - "setup.py"

jobs:
  linting:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint>=4.0.5
          pip install black
          pip install .
      - name: Lint with pylint
        run: |
          pylint --fail-under=9.95 deepface/
  type-check:
    needs: linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy==1.19.1
          pip install .
      - name: Type checking with MyPy
        run: |
          pip install types-Flask types-Werkzeug
          mypy deepface/
  unit-tests:
    needs: type-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache DeepFace weights
        uses: actions/cache@v4
        with:
          path: ~/.deepface/weights
          key: deepface-weights-${{ runner.os }}-py${{ matrix.python-version }}
          restore-keys: |
            deepface-weights-${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install .
      - name: Remove corrupted DeepFace weights (if any)
        run: |
          python - <<'PY'
          import os, glob
          weights_dir = os.path.expanduser("~/.deepface/weights")
          if not os.path.isdir(weights_dir):
            raise SystemExit(0)

          # Remove suspiciously small files (often indicates truncated downloads)
          for p in glob.glob(os.path.join(weights_dir, "*.h5")):
            try:
              if os.path.getsize(p) < 1024 * 100:  # <100KB is definitely broken for these models
                print("Removing tiny weight file:", p)
                os.remove(p)
            except OSError:
              pass
          PY
      - name: Test with pytest
        run: |
          cd tests/unit
          python -m pytest . -s --disable-warnings
